services:
  app:
    build: .
    container_name: intelligent-app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7
    container_name: intelligent-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    container_name: intelligent-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: intelligent-grafana
    ports:
      - "3000:3000"